<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitScope AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: #0f1629;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, rgba(14,165,233,0.3), rgba(99,102,241,0.2)); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(14,165,233,0.3); }
    .title { font-weight: 700; font-size: 15px; color: white; }
    .title span { color: #38bdf8; }

    /* URL Bar */
    .url-bar { padding: 12px; background: #0f1629; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .url-input-wrap { display: flex; gap: 6px; }
    .url-input {
      flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 6px 10px; color: white; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; outline: none;
    }
    .url-input:focus { border-color: rgba(14,165,233,0.5); }
    .btn-analyze {
      padding: 6px 12px; border-radius: 8px; background: #0284c7; border: none;
      color: white; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Space Grotesk', sans-serif;
      white-space: nowrap; transition: background 0.15s;
    }
    .btn-analyze:hover { background: #0ea5e9; }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading */
    .loading { padding: 40px 20px; text-align: center; }
    .spinner-wrap { display: flex; justify-content: center; gap: 6px; margin-bottom: 16px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #0ea5e9; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }
    .stage-label { color: #94a3b8; font-size: 12px; }

    /* Error */
    .error { margin: 12px; padding: 12px; border-radius: 10px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; font-size: 12px; }

    /* Results */
    .results { padding: 12px; space-y: 12px; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
    .card-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .card-title { font-weight: 600; font-size: 13px; color: white; display: flex; align-items: center; gap: 8px; }
    .card-body { padding: 14px; border-top: 1px solid rgba(255,255,255,0.05); }
    .chevron { transition: transform 0.2s; color: #64748b; font-size: 10px; }
    .chevron.open { transform: rotate(180deg); }

    /* Score badge */
    .score-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

    /* Tech chips */
    .tech-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .tech-chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); font-size: 11px; font-weight: 500; color: #cbd5e1; }

    /* Issue items */
    .issue-item { padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid; }
    .issue-critical { background: rgba(239,68,68,0.06); border-color: #ef4444; }
    .issue-warning { background: rgba(234,179,8,0.06); border-color: #eab308; }
    .issue-info { background: rgba(59,130,246,0.06); border-color: #3b82f6; }
    .issue-title { font-weight: 600; font-size: 12px; color: #e2e8f0; margin-bottom: 3px; }
    .issue-desc { font-size: 11px; color: #94a3b8; line-height: 1.5; }

    /* Summary */
    .summary-text { font-size: 12px; color: #cbd5e1; line-height: 1.7; white-space: pre-line; }
    .tab-row { display: flex; gap: 4px; margin-bottom: 10px; }
    .tab-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: #64748b; font-size: 11px; cursor: pointer; font-family: 'Space Grotesk', sans-serif; transition: all 0.15s; }
    .tab-btn.active { background: #0284c7; color: white; border-color: #0284c7; }

    /* Meta bar */
    .meta-bar { padding: 10px 14px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .repo-name { font-weight: 700; font-size: 14px; color: white; margin-bottom: 4px; }
    .repo-desc { font-size: 11px; color: #64748b; margin-bottom: 6px; }
    .meta-stats { display: flex; gap: 12px; font-size: 11px; color: #475569; font-family: 'JetBrains Mono', monospace; }

    .empty { text-align: center; padding: 30px 20px; color: #475569; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
      </svg>
    </div>
    <div class="title">GitScope<span> AI</span></div>
  </div>

  <div class="url-bar">
    <div class="url-input-wrap">
      <input type="url" id="urlInput" class="url-input" placeholder="https://github.com/owner/repo" />
      <button id="analyzeBtn" class="btn-analyze" onclick="triggerAnalyze()">Analyze</button>
    </div>
  </div>

  <div id="content">
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <div style="color: #94a3b8; font-size: 13px; font-weight: 600; margin-bottom: 4px;">Analyze any GitHub repo</div>
      <div style="color: #475569; font-size: 11px;">Navigate to a GitHub repository page<br>or enter a URL above</div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
