<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      padding: 16px;
    }
    .logo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, rgba(14,165,233,0.4), rgba(99,102,241,0.3)); border: 1px solid rgba(14,165,233,0.3); display: flex; align-items: center; justify-content: center; }
    h1 { font-size: 16px; font-weight: 700; color: white; }
    h1 span { color: #38bdf8; }
    p { font-size: 11px; color: #64748b; line-height: 1.5; margin-bottom: 14px; }
    .btn {
      display: block; width: 100%; padding: 9px; border-radius: 8px;
      background: linear-gradient(135deg, #0284c7, #4f46e5);
      color: white; font-size: 12px; font-weight: 600; border: none;
      cursor: pointer; text-align: center; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .hint { margin-top: 10px; font-size: 10px; color: #334155; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="logo-row">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </div>
    <h1>GitScope<span> AI</span></h1>
  </div>
  <p>Transform any GitHub repo into architecture diagrams, tech stack analysis, and AI summaries.</p>
  <button class="btn" id="openBtn">Open Side Panel</button>
  <div class="hint">Navigate to a GitHub repository<br>to see the "Analyze with AI" button</div>
  <script src="popup.js"></script>
</body>
</html>
